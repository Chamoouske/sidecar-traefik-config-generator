syntax = "proto3";

package sidecar;

option go_package = "github.com/chamoouske/traefik-sidecar/internal/api";

service SidecarService {
  rpc Connect(stream PeerMessage) returns (stream PeerMessage);
}

message PeerMessage {
  oneof payload {
    ConnectRequest connect_request = 1;
    ConnectResponse connect_response = 2;
    ContainerReport container_report = 3;
  }
}

message ConnectRequest {
  string node_name = 1;
  string node_host_ip = 2;
}

message ConnectResponse {
  string node_name = 1;
  string node_host_ip = 2;
}

message ContainerInfo {
  string container_id = 1;
  string name = 2;
  map<string, string> labels = 3;
}

message ContainerReport {
  repeated ContainerInfo containers = 1;
}
