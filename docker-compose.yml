services:
  traefik:
    image: traefik:v3.7
    hostname: "{{.Node.Hostname}}"
    networks:
      - traefik
    environment: 
      - PUID=1000
      - GUID=1000
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - type: bind
        target: /var/run/docker.sock
        source: /var/run/docker.sock
      - type: volume
        source: sync_data
        target: /dynamic
    command:
      - "--entrypoints.web.address=:80"
      # Configure HTTP to HTTPS Redirection
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # HTTPS EntryPoint
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      # Attach dynamic TLS file
      - "--providers.file.filename=/dynamic/shared/tls.yaml"
      # Providers
      # Enable the Docker Swarm provider (instead of Docker provider)
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      # Recommended: Don't expose services by default; require explicit labels
      - "--providers.swarm.exposedbydefault=false"
      # Observability
      - "--log.level=INFO" # Set the Log Level e.g INFO, DEBUG
      - "--accesslog=true" # Enable Access Logs
      - "--metrics.prometheus=true"  # Enable Prometheus
    deploy:
      mode: global

  
  # Hub Central - roda no manager node
  hub:
    image: chamoouske/traefik-sidecar-hub:latest
    hostname: "hub-{{.Node.Hostname}}"
    volumes:
      - type: bind
        target: /var/run/docker.sock
        source: /var/run/docker.sock
      - type: volume
        source: sync_data
        target: /etc/traefik-sidecar/shared
    networks:
      - traefik
    environment:
      PUID: 1000
      GUID: 1000
      TRAEFIK_SIDECAR_CONFIG_DIR: /etc/traefik-sidecar/shared
      TRAEFIK_SIDECAR_TRAEFIK_PORT: 80
      TRAEFIK_SIDECAR_BRIDGE_NAME: traefik_bridge
      TRAEFIK_SIDECAR_HUB_ADDR: ":8080"
      TRAEFIK_SIDECAR_HUB_ADVERTISE_ADDR: ""   # NOVO: vazio = auto-descoberta via Docker Swarm API
      TRAEFIK_SIDECAR_DOCKER_HOST: unix:///var/run/docker.sock
      TRAEFIK_SIDECAR_LOG_LEVEL: info
    ports:
      - "8080:8080"  # API do Hub
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=false"  # Não rotear pelo Traefik
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  agent:
    image: chamoouske/traefik-sidecar-agent:latest
    hostname: "agent-{{.Node.Hostname}}"
    volumes:
      - type: bind
        target: /var/run/docker.sock
        source: /var/run/docker.sock
      - type: volume
        source: sync_data
        target: /etc/traefik-sidecar/shared
    networks:
      - traefik
    environment:
      PUID: 1000
      GUID: 1000
      TRAEFIK_SIDECAR_CONFIG_DIR: /etc/traefik-sidecar/local
      TRAEFIK_SIDECAR_BRIDGE_NAME: traefik_bridge
      TRAEFIK_SIDECAR_HUB_ADDR: hub:8080
      TRAEFIK_SIDECAR_AGENT_PORT: 9090
      TRAEFIK_SIDECAR_TRAEFIK_PORT: 80
      TRAEFIK_SIDECAR_DOCKER_HOST: unix:///var/run/docker.sock
      TRAEFIK_SIDECAR_LOG_LEVEL: info
    ports:
      - "9090:9090"  # API do Agente (para Hub fazer push)
    deploy:
      mode: global  # Roda em TODOS os nós
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  syncthing:
    image: syncthing/syncthing:latest
    hostname: "syncthing.{{.Node.Hostname}}"
    environment:
      - STGUIADDRESS=0.0.0.0:8384
      - PUID=1000
      - GUID=1000
    volumes:
      - sync_data:/var/syncthing
    ports:
      - target: 8384
        published: 8384
        mode: host
      - target: 22000
        published: 22000
        mode: host
      - target: 21027
        published: 21027
        protocol: udp
        mode: host
    deploy:
      mode: global
      labels:
        - "traefik.federation.enable=true"
  # Deploy the Whoami application
  whoami:
    image: traefik/whoami
    hostname: "whoami.{{.Node.Hostname}}"
    #rule: "Host(`whoami.local`) && Headers(`X-Internal`,`true`)"
    networks:
      - traefik
    deploy:
      mode: replicated
      replicas: 1
      placement:
      # Placement constraints restrict where Traefik tasks can run.
      # Running on manager nodes is common for accessing the Swarm API via the socket.
        constraints:
          - node.role == worker
      labels:
        - "traefik.federation.enable=true"
volumes:
  sync_data:
    driver: local
# Define the overlay network for Swarm
networks:
  traefik:
    name: central
    external: true