# ─── Traefik Sidecar ─────────────────────────────────────────
# Deployment model depends on the host:
#
# Linux:   network_mode: host works — Agent listens on host IP,
#          mDNS multicasts reach the physical LAN.
#
# Docker Desktop (Windows/Mac): use bridge mode + port mapping.
#          network_mode: host does NOT expose ports/mDNS to
#          the host network. Set TRAEFIK_SIDECAR_NODE_HOST_IP
#          to the host's LAN IP and configure peers explicitly.
#
# See docs/ARCHITECTURE.md for details.
# ──────────────────────────────────────────────────────────────

services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    hostname: traefik
    network_mode: host
    environment:
      - PUID=1000
      - GUID=1000
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: volume
        source: traefik_shared
        target: /dynamic
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--providers.file.directory=/dynamic"
      - "--providers.file.watch=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"

  # ─── Linux host ──────────────────────────────────────────────
  # network_mode: host + auto-discovery via mDNS
  # Set TRAEFIK_SIDECAR_NODE_HOST_IP if auto-detection picks
  # the wrong interface.
  # ─────────────────────────────────────────────────────────────
  agent:
    image: chamoouske/traefik-sidecar-agent:latest
    container_name: agent
    network_mode: host
    volumes:
      - type: volume
        source: traefik_shared
        target: /etc/traefik-sidecar
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    environment:
      PUID: 1000
      GUID: 1000
      TRAEFIK_SIDECAR_CONFIG_DIR: /etc/traefik-sidecar
      TRAEFIK_SIDECAR_AGENT_PORT: 9090
      TRAEFIK_SIDECAR_LOG_LEVEL: info
      TRAEFIK_SIDECAR_DOCKER_HOST: unix:///var/run/docker.sock
      TRAEFIK_SIDECAR_POLL_INTERVAL: 60s
      # TRAEFIK_SIDECAR_NODE_HOST_IP: 192.168.1.20
      # TRAEFIK_SIDECAR_PEERS: 192.168.1.10,192.168.1.30
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:9090"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Web service (HTTP/1.1 — default) ─────────────────────
  # Cross-node transport forces HTTP/1.1 (forwardHTTPVersion: true)
  # so WebSocket upgrades work through the mesh.
  # ──────────────────────────────────────────────────────────
  web-app:
    image: traefik/whoami
    container_name: web-app
    hostname: web-app
    network_mode: host
    labels:
      - "traefik.sidecar.enable=true"
      - "traefik.sidecar.cross-node=true"
      - "traefik.sidecar.router.rule=Host(`web.local`)"
      - "traefik.sidecar.router.entrypoints=websecure"
      - "traefik.sidecar.service.port=80"

  # ─── gRPC service (HTTP/2 opt-in) ─────────────────────────
  # Sets traefik.sidecar.service.http2=true to select the
  # sidecar-internal-h2 transport, which omits forwardHTTPVersion
  # and lets HTTP/2 ALPN negotiation proceed naturally.
  # ──────────────────────────────────────────────────────────
  grpc-app:
    image: my-grpc-server
    container_name: grpc-app
    hostname: grpc-app
    network_mode: host
    labels:
      - "traefik.sidecar.enable=true"
      - "traefik.sidecar.cross-node=true"
      - "traefik.sidecar.router.rule=Host(`grpc.local`)"
      - "traefik.sidecar.router.entrypoints=websecure"
      - "traefik.sidecar.service.port=50051"
      - "traefik.sidecar.service.http2=true"

  # ─── Middleware example ─────────────────────────────────────
  # Define a middleware via labels and reference it in the router.
  # Produces _middlewares.yml (global) + hermes.yml (service).
  # ───────────────────────────────────────────────────────────
  hermes:
    image: traefik/whoami
    container_name: hermes
    hostname: hermes
    network_mode: host
    labels:
      - "traefik.sidecar.enable=true"
      - "traefik.sidecar.router.rule=Host(`hermes.local`)"
      - "traefik.sidecar.router.entrypoints=websecure"
      - "traefik.sidecar.router.middlewares=hermes-cors"
      - "traefik.sidecar.service.port=80"
      - "traefik.sidecar.middleware.hermes-cors.headers.customRequestHeaders.X-Forwarded-Proto=https"

  # ─── Docker Desktop (Windows/Mac) ──────────────────────────
  # Uncomment and adjust this profile instead of "agent" above.
  # Requires bridge mode + explicit port mapping + peer IPs.
  # ───────────────────────────────────────────────────────────
  # agent-desktop:
  #   image: chamoouske/traefik-sidecar-agent:latest
  #   container_name: agent
  #   volumes:
  #     - type: volume
  #       source: traefik_shared
  #       target: /etc/traefik-sidecar
  #     - type: bind
  #       source: /var/run/docker.sock
  #       target: /var/run/docker.sock
  #   ports:
  #     - target: 9090
  #       published: 9090
  #   environment:
  #     PUID: 1000
  #     GUID: 1000
  #     TRAEFIK_SIDECAR_CONFIG_DIR: /etc/traefik-sidecar
  #     TRAEFIK_SIDECAR_AGENT_PORT: 9090
  #     TRAEFIK_SIDECAR_LOG_LEVEL: info
  #     TRAEFIK_SIDECAR_DOCKER_HOST: unix:///var/run/docker.sock
  #     TRAEFIK_SIDECAR_NODE_HOST_IP: 192.168.1.10  # <-- Windows host LAN IP
  #     TRAEFIK_SIDECAR_PEERS: 192.168.1.20          # <-- Linux peer IP(s)
  #     TRAEFIK_SIDECAR_POLL_INTERVAL: 60s
  #   healthcheck:
  #     test: ["CMD", "/bin/grpc_health_probe", "-addr=:9090"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 10s

volumes:
  traefik_shared:
