services:
  traefik:
    image: traefik:v3.7
    hostname: "{{.Node.Hostname}}"
    networks:
      - traefik
    environment:
      - PUID=1000
      - GUID=1000
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - type: bind
        target: /var/run/docker.sock
        source: /var/run/docker.sock
      - type: volume
        source: traefik_shared
        target: /dynamic
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--providers.file.directory=/dynamic"
      - "--providers.file.watch=true"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.exposedbydefault=false"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
    deploy:
      mode: global

  hub:
    image: chamoouske/traefik-sidecar-hub:latest
    hostname: "hub.{{.Node.Hostname}}"
    volumes:
      - type: bind
        target: /var/run/docker.sock
        source: /var/run/docker.sock
      - type: volume
        source: traefik_shared
        target: /etc/traefik-sidecar
    networks:
      - traefik
    environment:
      PUID: 1000
      GUID: 1000
      TRAEFIK_SIDECAR_CONFIG_DIR: /etc/traefik-sidecar/shared
      TRAEFIK_SIDECAR_TRAEFIK_PORT: 80
      TRAEFIK_SIDECAR_BRIDGE_NAME: traefik_bridge
      TRAEFIK_SIDECAR_HUB_ADDR: ":8080"
      TRAEFIK_SIDECAR_HUB_ADVERTISE_ADDR: "192.168.1.72:8081"
      TRAEFIK_SIDECAR_DOCKER_HOST: unix:///var/run/docker.sock
      TRAEFIK_SIDECAR_LOG_LEVEL: info
    ports:
      - target: 8080
        published: 8081
        mode: host
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  agent:
    image: chamoouske/traefik-sidecar-agent:latest
    hostname: "agent.{{.Node.Hostname}}"
    volumes:
      - type: volume
        source: traefik_shared
        target: /etc/traefik-sidecar
    networks:
      - traefik
    environment:
      PUID: 1000
      GUID: 1000
      TRAEFIK_SIDECAR_CONFIG_DIR: /etc/traefik-sidecar/local
      TRAEFIK_SIDECAR_BRIDGE_NAME: ""
      TRAEFIK_SIDECAR_HUB_ADDR: 192.168.1.72:8081
      TRAEFIK_SIDECAR_AGENT_PORT: 9090
      TRAEFIK_SIDECAR_TRAEFIK_PORT: 80
      TRAEFIK_SIDECAR_LOG_LEVEL: info
    ports:
      - target: 9090
        published: 9090
        mode: host
    deploy:
      mode: global
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  whoami:
    image: traefik/whoami
    hostname: "whoami.{{.Node.Hostname}}"
    networks:
      - traefik
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      labels:
        - "traefik.sidecar.enable=true"
        - "traefik.sidecar.cross-node=true"
        - "traefik.sidecar.router.rule=Host(`whoami.local`)"
        - "traefik.sidecar.router.entrypoints=websecure"
        - "traefik.sidecar.service.port=80"

volumes:
  traefik_shared:
    name: traefik

networks:
  traefik:
    name: central
    external: true
    driver: overlay
