services:
  traefik:
    image: traefik:v3.7
    hostname: "{{.Node.Hostname}}"
    networks:
      - traefik
    environment: 
      - PUID=1000
      - GUID=1000
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - type: bind
        target: /var/run/docker.sock
        source: /var/run/docker.sock
      - type: volume
        source: sync_data
        target: /dynamic
    command:
      - "--entrypoints.web.address=:80"
      # Configure HTTP to HTTPS Redirection
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # HTTPS EntryPoint
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      # Attach dynamic TLS file
      - "--providers.file.filename=/dynamic/shared/tls.yaml"
      # Providers
      # Enable the Docker Swarm provider (instead of Docker provider)
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      # Recommended: Don't expose services by default; require explicit labels
      - "--providers.swarm.exposedbydefault=false"
      # Observability
      - "--log.level=INFO" # Set the Log Level e.g INFO, DEBUG
      - "--accesslog=true" # Enable Access Logs
      - "--metrics.prometheus=true"  # Enable Prometheus
    deploy:
      mode: global

  # ------------------------------------------------------------------
  # sidecar-global — Modo global (1 réplica, manager node)
  # Gera configurações de abrangência global do cluster (roteamento
  # entre nós, middlewares compartilhados, regras de hosts globais).
  # ------------------------------------------------------------------
  sidecar-global:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MODE=global
      - SHARED_OUTPUT_PATH=/data/shared/generated
      - LOCAL_OUTPUT_PATH=/data/local/generated
      - REGISTRY_PATH=/data/shared/registry
      - POLL_INTERVAL=30
      - LOG_LEVEL=info
      - PUID=1000
      - GUID=1000
    volumes:
      - sync_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # ------------------------------------------------------------------
  # sidecar-local — Modo local (global deploy, roda em cada node)
  # Gera configurações específicas do node local (certificados TLS
  # locais, regras de host locais, middlewares específicos do node).
  # ------------------------------------------------------------------
  sidecar-local:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MODE=local
      - SHARED_OUTPUT_PATH=/data/shared/generated
      - LOCAL_OUTPUT_PATH=/data/local/generated
      - REGISTRY_PATH=/data/shared/registry
      - POLL_INTERVAL=10
      - LOG_LEVEL=info
      - PUID=1000
      - GUID=1000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - sync_data:/data
    deploy:
      mode: global

  syncthing:
    image: syncthing/syncthing:latest
    hostname: "syncthing.{{.Node.Hostname}}"
    environment:
      - STGUIADDRESS=0.0.0.0:8384
      - PUID=1000
      - GUID=1000
    volumes:
      - sync_data:/var/syncthing
    ports:
      - target: 8384
        published: 8384
        mode: host
      - target: 22000
        published: 22000
        mode: host
      - target: 21027
        published: 21027
        protocol: udp
        mode: host
    deploy:
      mode: global
      labels:
        - "traefik.federation.enable=true"
  # Deploy the Whoami application
  whoami:
    image: traefik/whoami
    hostname: "whoami.{{.Node.Hostname}}"
    #rule: "Host(`whoami.local`) && Headers(`X-Internal`,`true`)"
    networks:
      - traefik
    deploy:
      mode: replicated
      replicas: 1
      placement:
      # Placement constraints restrict where Traefik tasks can run.
      # Running on manager nodes is common for accessing the Swarm API via the socket.
        constraints:
          - node.role == worker
      labels:
        - "traefik.federation.enable=true"
volumes:
  sync_data:
    driver: local
# Define the overlay network for Swarm
networks:
  traefik:
    name: central
    external: true