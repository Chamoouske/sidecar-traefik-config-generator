services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    hostname: traefik
    network_mode: host
    environment:
      - PUID=1000
      - GUID=1000
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: volume
        source: traefik_shared
        target: /dynamic
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--providers.file.directory=/dynamic"
      - "--providers.file.watch=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"

  agent:
    image: chamoouske/traefik-sidecar-agent:latest
    container_name: traefik-sidecar-agent
    hostname: traefik-sidecar-agent
    network_mode: host
    volumes:
      - type: volume
        source: traefik_shared
        target: /etc/traefik-sidecar
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    environment:
      PUID: 1000
      GUID: 1000
      TRAEFIK_SIDECAR_CONFIG_DIR: /etc/traefik-sidecar
      TRAEFIK_SIDECAR_AGENT_PORT: 9090
      TRAEFIK_SIDECAR_TRAEFIK_PORT: 80
      TRAEFIK_SIDECAR_LOG_LEVEL: info
      TRAEFIK_SIDECAR_DOCKER_HOST: unix:///var/run/docker.sock
      TRAEFIK_SIDECAR_NODE_HOST_IP: ""
      TRAEFIK_SIDECAR_POLL_INTERVAL: 60s
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:9090"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  whoami:
    image: traefik/whoami
    container_name: whoami
    hostname: whoami
    network_mode: host
    labels:
      - "traefik.sidecar.enable=true"
      - "traefik.sidecar.cross-node=true"
      - "traefik.sidecar.router.rule=Host(`whoami.local`)"
      - "traefik.sidecar.router.entrypoints=websecure"
      - "traefik.sidecar.service.port=80"

volumes:
  traefik_shared:
