services:
  traefik:
    image: traefik:v3.7
    hostname: "{{.Node.Hostname}}"
    networks:
      - traefik_proxy
    environment: 
      - PUID=1000
      - GUID=1000
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - type: bind
        target: /var/run/docker.sock
        source: /var/run/docker.sock
      - type: volume
        source: sync_data
        target: /certs
        volume:
          subpath: certs
      - type: volume
        source: sync_data
        target: /dynamic
        volume:
          subpath: dynamic
    command:
      - "--entrypoints.web.address=:80"
      # Configure HTTP to HTTPS Redirection
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # HTTPS EntryPoint
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      # Attach dynamic TLS file
      - "--providers.file.filename=/dynamic/tls.yaml"
      # Providers
      # Enable the Docker Swarm provider (instead of Docker provider)
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      # Watch for Swarm service changes (requires socket access)
      - "--providers.swarm.watch=true"
      # Recommended: Don't expose services by default; require explicit labels
      - "--providers.swarm.exposedbydefault=false"
      # Specify the default network for Traefik to connect to services
      - "--providers.swarm.network=traefik"
      # Observability
      - "--log.level=INFO" # Set the Log Level e.g INFO, DEBUG
      - "--accesslog=true" # Enable Access Logs
      - "--metrics.prometheus=true"  # Enable Prometheus
    deploy:
      mode: global
  
  federation-generator:
    image: chamoouske/sidecar-traefik:latest
    environment:
      - OUTPUT_FILE=/data/dynamic/federation.generated.yaml
      - LABEL_KEY=traefik.federation
      - LABEL_VALUE=true
      - TRAEFIK_SCHEME=http
      - TRAEFIK_PORT=80
      - REFRESH_SECONDS=10
      - PUID=1000
      - GUID=1000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - sync_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  syncthing:
    image: syncthing/syncthing:latest
    hostname: "{{.Node.Hostname}}"
    environment:
      - STGUIADDRESS=0.0.0.0:8384
      - PUID=1000
      - GUID=1000
    volumes:
      - sync_data:/var/syncthing
    ports:
      - target: 8384
        published: 8384
        mode: host
      - target: 22000
        published: 22000
        mode: host
      - target: 21027
        published: 21027
        protocol: udp
        mode: host
    deploy:
      mode: global
  # Deploy the Whoami application
  whoami:
    image: traefik/whoami
    hostname: "{{.Node.Hostname}}"
    #rule: "Host(`whoami.local`) && Headers(`X-Internal`,`true`)"
    networks:
      - traefik_proxy
    deploy:
      mode: replicated
      replicas: 1
      placement:
      # Placement constraints restrict where Traefik tasks can run.
      # Running on manager nodes is common for accessing the Swarm API via the socket.
        constraints:
          - node.role == worker
      labels:
        - "traefik.enable=false"
volumes:
  sync_data:
    driver: local
# Define the overlay network for Swarm
networks:
  traefik_proxy:
    name: over
    external: true